name: "unit-tests"
on:
  pull_request:
  push:
    branches:
      - master
      - "releases/*"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 100
      - run: yarn install --frozen-lockfile
      - run: |
          yarn lint
          yarn test

  example-usage:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 100

      - uses: ./
        id: has-changed-path
        with:
          paths: .github/workflows/test_folder/test_file.txt
          .github/workflows/test_folder/test_file copy.txt

      - if: steps.has-changed-path.outputs.changed == 'true'
        run: echo 'File .github/workflows/test_folder/test_file.txt is changed'

      - if: steps.has-changed-path.outputs.changed == 'false'
        run: echo 'File .github/workflows/test_folder/test_file.txt is not changed'
